                                        <div className="mt-4 pt-4 border-t border-slate-200 w-full">
                                            <p className="text-[10px] text-green-500 uppercase font-black mb-1 flex items-center justify-center gap-1"><Icon name="check-circle" className="w-3 h-3" /> Оплачено через {paymentProvider}</p>
                                            <p className={`text-2xl font-black font-mono ${isStandard ? 'text-indigo-600' : 'text-cyan-600'}`}>{totalPrice.toLocaleString('ru-RU')} сум</p>
                                            {discountPercent > 0 && <p className="text-[10px] text-emerald-500 mt-1 font-bold">(С учетом скидки {discountPercent * 100}%)</p>}
                                        </div>
                                    </div>
                                </div>

                                {/* Yuklab olish tugmalari */}
                                <div className="flex gap-3 mt-5">
                                    <button
                                        onClick={() => {
                                            const ticket = document.querySelector('.ticket-print-area');
                                            if (!ticket) return alert('Chipta topilmadi!');
                                            html2canvas(ticket, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                                                const link = document.createElement('a');
                                                link.download = `chipta-${orderNumber}.png`;
                                                link.href = canvas.toDataURL('image/png');
                                                link.click();
                                            });
                                        }}
                                        className="flex-1 py-4 rounded-2xl font-bold text-white flex justify-center items-center gap-2 transition-all bg-indigo-600/80 hover:bg-indigo-600 border border-indigo-500/50 shadow-lg shadow-indigo-500/20 hover:scale-[1.02] active:scale-95"
                                    >
                                        <Icon name="download" className="w-5 h-5" />
                                        <span className="text-sm">Onlayn skachat</span>
                                    </button>
                                    <button
                                        onClick={() => {
                                            const ticket = document.querySelector('.ticket-print-area');
                                            if (!ticket) return alert('Chipta topilmadi!');
                                            html2canvas(ticket, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                                                const imgData = canvas.toDataURL('image/png');
                                                const pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
                                                const pdfW = pdf.internal.pageSize.getWidth();
                                                const pdfH = (canvas.height * pdfW) / canvas.width;
                                                pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);
                                                pdf.save(`chipta-${orderNumber}.pdf`);
                                            });
                                        }}
                                        className="flex-1 py-4 rounded-2xl font-bold text-white flex justify-center items-center gap-2 transition-all bg-rose-600/80 hover:bg-rose-600 border border-rose-500/50 shadow-lg shadow-rose-500/20 hover:scale-[1.02] active:scale-95"
                                    >
                                        <Icon name="file-text" className="w-5 h-5" />
                                        <span className="text-sm">PDF ga skachat</span>
                                    </button>
                                </div>

                                <button onClick={() => {
                                    setStep('form');
                                    setSelectedSeats([]);
                                    setExtras([]);
                                    setPromoCode('');
                                    setDiscountPercent(0);
                                    setCardNumber('');
                                    setCardExpiry('');
                                    setCardHolder('');
                                }} className="w-full mt-4 py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold border border-white/10 transition-colors">Новый билет</button>
                            </div>
                        )}

                        {/* YANGA QO'SHILGAN: TELEGRAM YORDAM TUGMASI (SUPPORT BUTTON) */}
                        <button
                            onClick={() => setShowSupportModal(true)}
                            className="fixed bottom-6 right-6 w-14 h-14 bg-[#007BFF] hover:bg-blue-600 text-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,123,255,0.5)] transition-transform hover:scale-110 z-50"
                        >
                            <Icon name="message-circle" className="w-6 h-6" />
                        </button>

                        {/* YANGA QO'SHILGAN: TELEGRAM YORDAM OYNASI (SUPPORT MODAL) */}
                        {showSupportModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                                <div className="bg-slate-900 border border-white/10 rounded-[2rem] p-8 max-w-sm w-full shadow-[0_0_50px_rgba(0,0,0,0.8)] transform animate-slide-up">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl font-black text-white flex items-center gap-2">
                                            <Icon name="send" className="w-5 h-5 text-[#007BFF]" /> Bog'lanish
                                        </h3>
                                        <button onClick={() => setShowSupportModal(false)} className="text-slate-400 hover:text-white">
                                            <Icon name="x" className="w-6 h-6" />
                                        </button>
                                    </div>
                                    <p className="text-slate-400 text-sm mb-6">Savol yoki muammolaringizni yozib qoldiring, biz tez orada siz bilan bog'lanamiz.</p>

                                    <div className="space-y-4 mb-6">
                                        <input
                                            type="text"
                                            value={supportFio}
                                            onChange={(e) => setSupportFio(e.target.value)}
                                            placeholder="FIO"
                                            className="w-full p-4 bg-white border border-slate-200 text-slate-800 rounded-xl outline-none focus:border-[#007BFF] placeholder-slate-500 font-medium"
                                        />
                                        <input
                                            type="text"
                                            value={supportPhone}
                                            onChange={(e) => setSupportPhone(e.target.value)}
                                            placeholder="Telefon raqami"
                                            className="w-full p-4 bg-white border border-slate-200 text-slate-800 rounded-xl outline-none focus:border-[#007BFF] placeholder-slate-500 font-medium"
                                        />
                                        <textarea
                                            value={supportMsg}
                                            onChange={(e) => setSupportMsg(e.target.value)}
                                            placeholder="Сообщение (Xabar)..."
                                            className="w-full p-4 bg-white border border-slate-200 text-slate-800 rounded-xl outline-none focus:border-[#007BFF] placeholder-slate-500 h-28 resize-none font-medium"
                                        ></textarea>
                                    </div>

                                    <button
                                        onClick={handleSendSupport}
                                        disabled={isSendingSupport}
                                        className={`w-full py-4 rounded-xl font-bold text-white flex justify-center items-center gap-2 transition-all ${isSendingSupport ? 'bg-blue-400 cursor-wait' : 'bg-[#007BFF] hover:bg-blue-600 shadow-lg shadow-blue-500/30'}`}
                                    >
                                        {isSendingSupport ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : null}
                                        {isSendingSupport ? 'Yuborilmoqda...' : 'Yuborish'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* TOAST BILDIRISH (chiroyli xabar) */}
                    {toast && (
                        <div
                            style={{ position: 'fixed', bottom: '96px', left: '50%', transform: 'translateX(-50%)', zIndex: 200, maxWidth: '360px', width: '90%' }}
                            className={`flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-md text-sm font-bold animate-slide-up ${toast.type === 'success' ? 'bg-emerald-900/95 border-emerald-500/50 text-emerald-100' :
                                toast.type === 'warning' ? 'bg-amber-900/95 border-amber-500/50 text-amber-100' :
                                    'bg-red-900/95 border-red-500/50 text-red-100'
                                }`}
                        >
                            <Icon name={toast.type === 'success' ? 'check-circle' : toast.type === 'warning' ? 'alert-triangle' : 'alert-circle'} className="w-5 h-5 shrink-0" />
                            <span>{toast.message}</span>
                        </div>
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
