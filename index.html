<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpressLine & AeroExpress - Бронирование билетов</title>

    <!-- React va Babel yuklanishi -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2canvas va jsPDF (chipta yuklab olish uchun) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Shriftlar -->
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- Maxfiy sozlamalar (token va ID) -->
    <script src="config.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .glow-button {
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
        }

        .glow-button:hover {
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.7);
        }

        .glow-seat-standard {
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.6);
        }

        .glow-seat-vip {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
        }

        .ticket-dash {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.2) 50%, transparent 50%);
            background-size: 10px 2px;
            background-repeat: repeat-x;
        }

        select option {
            background: #1e293b;
            color: #fff;
            padding: 8px;
        }

        select optgroup {
            background: #0f172a;
            color: #818cf8;
            font-weight: 900;
            font-style: normal;
            padding: 8px;
        }

        /* Animatsiyalar */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }

        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
            transform: translateX(-100%);
            animation: shimmer 1.5s infinite;
        }

        @media print {
            body {
                background-color: #fff;
                color: #000;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #root>div:not(.ticket-print-area) {
                display: none;
            }

            .ticket-print-area {
                display: block !important;
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
                border: none;
            }

            .ticket-print-area .glass-panel {
                background: #fff;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                border: 1px solid #ccc;
            }

            .ticket-print-area .text-white {
                color: #000 !important;
            }

            .ticket-print-area .text-gray-300 {
                color: #333 !important;
            }

            .ticket-print-area .bg-slate-800 {
                background-color: #f0f0f0 !important;
            }

            .ticket-print-area .bg-indigo-600 {
                background-color: #6366f1 !important;
            }

            .ticket-print-area .text-indigo-300 {
                color: #6366f1 !important;
            }

            .ticket-print-area .text-red-500 {
                color: #ef4444 !important;
            }

            .ticket-print-area .text-cyan-400 {
                color: #22d3ee !important;
            }

            .ticket-print-area .ticket-dash {
                background-image: linear-gradient(to right, rgba(0, 0, 0, 0.2) 50%, transparent 50%);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // 🤖 TELEGRAM BOT SOZLAMALARI
        // Token va Chat ID -> config.js faylida saqlangan (xavfsiz)
        // =========================================================================
        // (TELEGRAM_BOT_TOKEN va TELEGRAM_CHAT_ID config.js dan keladi)

        // Telegramga xabar yuborish funksiyasi
        const sendToTelegram = async (messageText) => {
            if (TELEGRAM_BOT_TOKEN === 'SIZNING_BOT_TOKENINGIZNI_SHU_YERGA_YOZING') {
                console.warn("Telegram Bot Token kiritilmagan! Xabar yuborilmadi.");
                return false;
            }
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: messageText,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch (error) {
                console.error("Telegram error:", error);
                return false;
            }
        };

        // Lucide Icon Komponenti
        const Icon = ({ name, className = "" }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const LOCATIONS = {

            "Казахстан": ["Астана", "Алматы", "Шымкент", "Караганда", "Актобе", "Тараз", "Павлодар", "Усть-Каменогорск", "Семей", "Атырау", "Костанай", "Кызылорда", "Уральск", "Петропавловск"],
            "Россия": ["Москва", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань", "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону", "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград", "Краснодар", "Саратов", "Тюмень", "Тольятти", "Ижевск", "Барнаул", "Ульяновск", "Иркутск", "Хабаровск", "Владивосток", "Сочи"],
            "ОАЭ": ["Дубай", "Абу-Даби", "Шарджа", "Аджман", "Рас-эль-Хайма", "Фуджейра", "Умм-эль-Кайвайн", "Аль-Айн"],
            "Турция": ["Стамбул", "Анкара", "Измир", "Анталья", "Бурса", "Адана", "Газиантеп", "Конья", "Кайсери", "Мерсин", "Диярбакыр", "Трабзон", "Эрзурум", "Бодрум", "Мармарис", "Аланья"],

            "Великобритания": ["Лондон", "Бирмингем", "Глазго", "Манчестер", "Ливерпуль", "Лидс", "Шеффилд", "Эдинбург", "Бристоль", "Кардифф", "Лестер", "Ноттингем", "Белфаст", "Ньюкасл"],
            "Германия": ["Берлин", "Гамбург", "Мюнхен", "Кёльн", "Франкфурт", "Штутгарт", "Дюссельдорф", "Дортмунд", "Эссен", "Лейпциг", "Бремен", "Дрезден", "Ганновер", "Нюрнберг"],
            "Франция": ["Париж", "Марсель", "Лион", "Тулуза", "Ницца", "Нант", "Страсбург", "Монпелье", "Бордо", "Лилль", "Ренн", "Реймс", "Сент-Этьен"],
            "Италия": ["Рим", "Милан", "Неаполь", "Турин", "Палермо", "Генуя", "Болонья", "Флоренция", "Бари", "Катания", "Венеция", "Верона"],
            "Испания": ["Мадрид", "Барселона", "Валенсия", "Севилья", "Сарагоса", "Малага", "Мурсия", "Пальма", "Лас-Пальмас", "Бильбао", "Аликанте", "Кордова"],
            "Индия": ["Дели", "Мумбаи", "Бангалор", "Ченнаи", "Калькутта", "Колката", "Хайдарабад", "Ахмедабад", "Пуна", "Сурат", "Канпур", "Джайпур"],
            "Саудовская Аравия": ["Эр-Рияд", "Джидда", "Мекка", "Медина", "Даммам", "Эт-Таиф", "Табук", "Бурайда", "Хамис-Мушайт", "Эль-Хуфуф"],
            "Кыргызстан": ["Бишкек", "Ош", "Джалал-Абад", "Каракол", "Токмок", "Узген", "Балыкчы", "Кара-Балта"],
            "Таджикистан": ["Душанбе", "Худжанд", "Куляб", "Бохтар", "Истаравшан", "Турсунзаде", "Пенджикент", "Исфара"],
            "Туркменистан": ["Ашхабад", "Туркменабад", "Дашогуз", "Мары", "Балканабад", "Туркменбаши"],
            "Египет": ["Каир", "Александрия", "Гиза", "Шубра-эль-Хейма", "Порт-Саид", "Суэц", "Луксор", "Эль-Мансура", "Танта", "Хургада", "Шарм-эш-Шейх"],
            "Таиланд": ["Бангкок", "Нонтхабури", "Накхонратчасима", "Чиангмай", "Хатъяй", "Удонтхани", "Паккрет", "Кхонкэн", "Паттайя", "Пхукет"]
        };

        const PRICES = {
            train: { STANDARD: 1200000, BUSINESS: 2500000 },
            plane: { STANDARD: 1200000, BUSINESS: 3500000 }
        };

        const EXTRA_SERVICES = [
            { id: 'baggage', name: 'Дополнительный багаж +20кг', price: 150000, icon: 'briefcase' },
            { id: 'meal', name: 'Горячее питание на борту', price: 80000, icon: 'utensils' },
            { id: 'vip', name: 'Доступ в VIP-зал ожидания', price: 250000, icon: 'coffee' },
            { id: 'insurance', name: 'Страхование пассажира', price: 45000, icon: 'shield' }
        ];

        const VEHICLE_SPEEDS = {
            'Афросиаб (Высокоскоростной)': { speed: 250, multiplier: 0.4 },
            'Шарк (Скоростной)': { speed: 120, multiplier: 0.7 },
            'Спальный вагон (Ночной)': { speed: 70, multiplier: 1.3 },
            'Boeing 787 Dreamliner': { speed: 900, multiplier: 0.85 },
            'Airbus A320neo': { speed: 830, multiplier: 1.0 },
            'Boeing 737 MAX': { speed: 850, multiplier: 0.95 }
        };

        const PROMO_CODES = {
            'SUPER30': 0.30, 'WELCOME30': 0.30, 'SALE30': 0.30,
            'VIP30': 0.30, 'EXPRESS30': 0.30, 'AERO30': 0.30, 'TASHKENT30': 0.30
        };

        const App = () => {
            const [step, setStep] = React.useState('form'); // 'form' -> 'payment' -> 'gateway' -> 'success'
            const [availableTrips, setAvailableTrips] = React.useState([]);
            const [selectedTrip, setSelectedTrip] = React.useState(null);
            const [isProcessing, setIsProcessing] = React.useState(false);
            const [paymentProvider, setPaymentProvider] = React.useState('');
            const [orderNumber, setOrderNumber] = React.useState('');
            const [transportMode, setTransportMode] = React.useState('train');
            const [vehicleType, setVehicleType] = React.useState('Афросиаб (Высокоскоростной)');

            const [selectedSeats, setSelectedSeats] = React.useState([]);
            const [occupiedSeats, setOccupiedSeats] = React.useState([]);

            const [extras, setExtras] = React.useState([]);
            const [promoCode, setPromoCode] = React.useState('');
            const [discountPercent, setDiscountPercent] = React.useState(0);
            const [timeLeft, setTimeLeft] = React.useState(600);

            const [cardNumber, setCardNumber] = React.useState('');
            const [cardExpiry, setCardExpiry] = React.useState('');
            const [cardHolder, setCardHolder] = React.useState('');
            const [isFetchingName, setIsFetchingName] = React.useState(false);

            const [showConfirmModal, setShowConfirmModal] = React.useState(false);
            const [showTrips, setShowTrips] = React.useState(false);
            const [promoError, setPromoError] = React.useState('');
            const [promoSuccess, setPromoSuccess] = React.useState('');

            // Toast bildirish tizimi
            const [toast, setToast] = React.useState(null);
            const showToast = (message, type = 'error') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            // Support (Telegram) Modal holatlari
            const [showSupportModal, setShowSupportModal] = React.useState(false);
            const [supportFio, setSupportFio] = React.useState('');
            const [supportPhone, setSupportPhone] = React.useState('');
            const [supportMsg, setSupportMsg] = React.useState('');
            const [isSendingSupport, setIsSendingSupport] = React.useState(false);

            const [formData, setFormData] = React.useState({
                name: '', phone: '',
                date: '2026-03-15', time: '11:00',
                type: 'STANDARD', from: 'Ташкент', to: 'Дубай'
            });

            // O'rindiq sxemalari (global konstantlar)
            const isStandard = formData.type === 'STANDARD';
            const TRAIN_STD = []; for (let i = 1; i <= 10; i++) TRAIN_STD.push([`${i}A`, `${i}B`, 'aisle', `${i}C`, `${i}D`]);
            const TRAIN_VIP = []; for (let i = 1; i <= 6; i++) TRAIN_VIP.push([`V${i}A`, 'aisle', `V${i}B`, `V${i}C`]);
            const PLANE_STD = []; for (let i = 1; i <= 12; i++) PLANE_STD.push([`${i}A`, `${i}B`, `${i}C`, 'aisle', `${i}D`, `${i}E`, `${i}F`]);
            const PLANE_VIP = []; for (let i = 1; i <= 4; i++) PLANE_VIP.push([`B${i}A`, `B${i}B`, 'aisle-wide', `B${i}E`, `B${i}F`]);
            const activeLayout = transportMode === 'train' ? (isStandard ? TRAIN_STD : TRAIN_VIP) : (isStandard ? PLANE_STD : PLANE_VIP);

            // Band o'rindiqlarni avtomatik tanlash (har safar rejim/tip/reys o'zgarganda)
            React.useEffect(() => {
                const allSeats = activeLayout.flat().filter(s => !s.startsWith('aisle'));
                const numOccupied = Math.floor(allSeats.length * 0.35);
                const shuffled = [...allSeats].sort(() => 0.5 - Math.random());
                setOccupiedSeats(shuffled.slice(0, numOccupied));
                setSelectedSeats([]);
            }, [transportMode, formData.type, selectedTrip]);

            // To'lov vaqt hisoblagichi (taymer)
            React.useEffect(() => {
                let timer;
                if (step === 'payment' || step === 'gateway') {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                setStep('form');
                                setCardNumber(''); setCardExpiry(''); setCardHolder('');
                                showToast("Bron vaqti tugadi. Iltimos, qaytadan urinib ko'ring.", 'warning');
                                return 600;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } else {
                    setTimeLeft(600);
                }
                return () => clearInterval(timer);
            }, [step]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const handleSwapLocations = () => setFormData(prev => ({ ...prev, from: prev.to, to: prev.from }));

            const handleCardNumberChange = (e) => {
                const val = e.target.value.replace(/\D/g, '');
                setCardNumber(val.replace(/(.{4})/g, '$1 ').trim().substring(0, 19));
            };

            const handleCardExpiryChange = (e) => {
                const val = e.target.value.replace(/\D/g, '');
                setCardExpiry(val.length >= 3 ? `${val.slice(0, 2)}/${val.slice(2, 4)}` : val);
            };

            React.useEffect(() => {
                if (cardNumber.length === 19 && cardExpiry.length === 5) {
                    setIsFetchingName(true);
                    setCardHolder('');
                    const timer = setTimeout(() => {
                        const nameToDisplay = formData.name ? formData.name.toUpperCase() : 'ВЛАДЕЛЕЦ КАРТЫ';
                        setCardHolder(nameToDisplay);
                        setIsFetchingName(false);
                    }, 1200);
                    return () => clearTimeout(timer);
                } else {
                    setCardHolder('');
                }
            }, [cardNumber, cardExpiry, formData.name]);

            const toggleSeat = (seatId) => setSelectedSeats(prev => prev.includes(seatId) ? prev.filter(s => s !== seatId) : [...prev, seatId].sort((a, b) => a.localeCompare(b, undefined, { numeric: true })));
            const toggleExtra = (extId) => setExtras(prev => prev.includes(extId) ? prev.filter(e => e !== extId) : [...prev, extId]);

            const handlePromoApply = () => {
                const code = promoCode.toUpperCase().trim();
                if (PROMO_CODES[code]) {
                    setDiscountPercent(PROMO_CODES[code]);
                    setPromoSuccess(`✓ Chegirma qo'llandi: ${PROMO_CODES[code] * 100}%`);
                    setPromoError('');
                } else if (code !== '') {
                    setDiscountPercent(0);
                    setPromoError('Promo kod noto\'g\'ri yoki muddati o\'tgan!');
                    setPromoSuccess('');
                }
            };

            const handleTypeChange = (newType) => {
                if (newType !== formData.type) { setFormData({ ...formData, type: newType }); setSelectedSeats([]); }
            };

            const handleModeChange = (mode) => {
                if (mode !== transportMode) {
                    setTransportMode(mode);
                    setSelectedSeats([]);
                    setVehicleType(mode === 'train' ? 'Афросиаб (Высокоскоростной)' : 'Boeing 787 Dreamliner');
                }
            };

            const handlePhoneChange = (e) => setFormData({ ...formData, phone: e.target.value.replace(/\D/g, '') });

            const handleProceedToPayment = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (selectedSeats.length === 0) return showToast("Iltimos, o'rindiq sxemasidan joy tanlang!");
                setStep('payment');
            };


            const processExternalGateway = (method) => {
                setPaymentProvider(method); setCardNumber(''); setCardExpiry(''); setCardHolder(''); setStep('gateway');
            };

            const handleFinalizeClick = () => {
                if (cardNumber.length !== 19 || cardExpiry.length !== 5) return showToast("Karta raqami va muddatini to'g'ri kiriting!");
                setShowConfirmModal(true);
            };

            const basePrice = PRICES[transportMode][formData.type] * selectedSeats.length;
            let extrasTotal = 0;
            extras.forEach(extId => {
                const service = EXTRA_SERVICES.find(e => e.id === extId);
                if (service) extrasTotal += service.price * selectedSeats.length;
            });
            const subTotal = selectedSeats.length > 0 ? basePrice + extrasTotal : 0;
            const discountAmount = subTotal * discountPercent;
            const totalPrice = subTotal - discountAmount;

            // Haqiqiy to'lovni boshlash va Telegramga jo'natish
            const confirmAndPay = () => {
                setShowConfirmModal(false);
                setIsProcessing(true);
                setTimeout(() => {
                    const generatedId = `ORD-${Math.random().toString(36).substring(2, 10).toUpperCase()}`;
                    setOrderNumber(generatedId);
                    setIsProcessing(false);
                    setStep('success');

                    // Telegramga buyurtma haqida ma'lumot yuborish
                    const msg = `
🛒 <b>Yangi buyurtma: #${generatedId}</b>
👤 Yo'lovchi: ${formData.name}
📞 Telefon: +998${formData.phone}
🌍 Marshrut: ${formData.from} ➔ ${formData.to}
📅 Jo'nab ketish: ${formData.date} | ${selectedTrip?.depTime || formData.time}
🏁 Yetib kelish: ${arrivalDateStr || '-'} | ${arrivalTimeStr || '-'}
🚀 Transport: ${selectedTrip?.vehicle || vehicleType} (${transportMode === 'train' ? 'Poyezd' : 'Samolyot'})
💺 O'rindiqlar: ${selectedSeats.join(', ')} (${formData.type})
💳 To'landi: ${totalPrice.toLocaleString('ru-RU')} so'm (${paymentProvider})
`;
                    sendToTelegram(msg);
                }, 2000);
            };

            // Qo'llab-quvvatlash xabarini yuborish
            const handleSendSupport = async () => {
                if (!supportFio.trim() || !supportPhone.trim() || !supportMsg.trim()) {
                    return showToast("Iltimos, barcha maydonlarni to'ldiring!");
                }
                setIsSendingSupport(true);
                const msg = `
📩 <b>Yangi xabar (Qo'llab-quvvatlash)</b>
👤 FIO: ${supportFio}
📞 Telefon: ${supportPhone}
💬 Xabar:
${supportMsg}
`;
                const success = await sendToTelegram(msg);
                setIsSendingSupport(false);
                if (success) {
                    showToast("Xabaringiz yuborildi! Tez orada javob beramiz.", 'success');
                    setShowSupportModal(false);
                    setSupportFio('');
                    setSupportPhone('');
                    setSupportMsg('');
                } else {
                    showToast("Xatolik yuz berdi. Keyinroq urinib ko'ring.");
                }
            };

            const getTravelDuration = (from, to, mode, vehicle) => {
                if (from === to) return { hours: 0, mins: 0, speed: 0 };
                const str = from < to ? from + to : to + from;
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                hash = Math.abs(hash);

                let baseMins = mode === 'plane' ? (hash % 400) + 120 : (hash % 1000) + 240;
                const vehicleInfo = VEHICLE_SPEEDS[vehicle] || { speed: 100, multiplier: 1 };
                const totalMins = Math.round(baseMins * vehicleInfo.multiplier);

                return { hours: Math.floor(totalMins / 60), mins: totalMins % 60, speed: vehicleInfo.speed };
            };

            const travelTime = getTravelDuration(formData.from, formData.to, transportMode, vehicleType);
            let arrivalDateStr = ""; let arrivalTimeStr = ""; let travelStr = "";
            if (travelTime.hours > 0 || travelTime.mins > 0) {
                travelStr = `${travelTime.hours} ч ${travelTime.mins > 0 ? travelTime.mins + ' мин' : ''}`;
                if (formData.date && formData.time) {
                    const depDate = new Date(`${formData.date}T${formData.time}`);
                    if (!isNaN(depDate.getTime())) {
                        const arrDate = new Date(depDate.getTime() + (travelTime.hours * 60 + travelTime.mins) * 60000);
                        arrivalTimeStr = arrDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        arrivalDateStr = arrDate.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    }
                }
            }

            const iconName = transportMode === 'train' ? 'train' : 'plane';
            const brandName = transportMode === 'train' ? 'ExpressLine' : 'AeroExpress';

            return (
                <React.Fragment>
                    <div className="min-h-screen relative flex flex-col justify-center items-center p-4 md:p-8 overflow-hidden text-slate-200 animate-fade-in">

                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/30 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-600/20 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute top-[40%] left-[50%] w-[30%] h-[30%] bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none transform -translate-x-1/2"></div>

                        {(step === 'form' || step === 'payment') && (
                            <div className="relative z-20 flex bg-white/5 p-1.5 rounded-2xl border border-white/10 mb-6 shadow-2xl backdrop-blur-md">
                                <button
                                    onClick={() => handleModeChange('train')}
                                    disabled={step === 'payment'}
                                    className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all duration-300 ${transportMode === 'train' ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'text-slate-400 hover:text-white hover:bg-white/5'} ${step === 'payment' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                >
                                    <Icon name="train" className="w-5 h-5 mr-2" /> Поезд
                                </button>
                                <button
                                    onClick={() => handleModeChange('plane')}
                                    disabled={step === 'payment'}
                                    className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all duration-300 ${transportMode === 'plane' ? 'bg-cyan-600 text-white shadow-lg scale-105' : 'text-slate-400 hover:text-white hover:bg-white/5'} ${step === 'payment' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                >
                                    <Icon name="plane" className="w-5 h-5 mr-2" /> Самолет
                                </button>
                            </div>
                        )}

                        {/* 1. BRON QILISH FORMASI */}
                        {step === 'form' && (
                            <div className="glass-panel max-w-2xl w-full rounded-[2rem] shadow-2xl overflow-hidden relative z-10 animate-slide-up pb-8">

                                <div className="relative p-8 border-b border-white/10 overflow-hidden">
                                    <div className={`absolute top-0 right-0 w-64 h-64 rounded-full blur-[50px] -mr-10 -mt-10 ${transportMode === 'train' ? 'bg-indigo-500/20' : 'bg-cyan-500/20'}`}></div>
                                    <div className="relative z-10 flex items-center justify-between">
                                        <h1 className="text-4xl font-black text-white tracking-tight flex items-center gap-3">
                                            <Icon name={iconName} className={`w-8 h-8 ${transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400'}`} />
                                            {brandName}
                                        </h1>
                                        <div className="hidden sm:flex h-16 w-16 rounded-2xl bg-white/5 border border-white/10 items-center justify-center">
                                            <Icon name="sparkles" className={`w-8 h-8 ${transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400'}`} />
                                        </div>
                                    </div>
                                </div>

                                <form onSubmit={handleProceedToPayment} className="px-8 pt-8 space-y-8">

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12 bg-black/20 p-6 rounded-3xl border border-white/5 relative">

                                        {travelStr && (
                                            <div className="absolute left-1/2 top-[10%] md:top-[15%] -translate-x-1/2 text-[10px] text-indigo-300 font-bold bg-indigo-900/40 px-4 py-1 rounded-full border border-indigo-500/30 hidden md:block whitespace-nowrap z-30 shadow-lg backdrop-blur-md">
                                                В пути: {travelStr}
                                            </div>
                                        )}

                                        <button
                                            type="button"
                                            onClick={handleSwapLocations}
                                            title="Поменять местами"
                                            className="absolute left-1/2 top-[62%] md:top-[58%] -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-indigo-600 hover:bg-indigo-500 rounded-full flex items-center justify-center z-30 border border-white/20 hidden md:flex transition-transform hover:scale-110 shadow-[0_0_20px_rgba(79,70,229,0.5)] cursor-pointer"
                                        >
                                            <Icon name="arrow-right-left" className="w-5 h-5 text-white" />
                                        </button>

                                        <div className="space-y-2 relative z-20">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1 flex items-center gap-1">
                                                <Icon name="map-pin" className="w-3 h-3 text-indigo-400" /> Откуда (Город)
                                            </label>
                                            <select value={formData.from} onChange={(e) => setFormData({ ...formData, from: e.target.value })} className="w-full px-4 md:pr-14 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-indigo-500/50 text-white font-bold cursor-pointer appearance-none">
                                                {Object.entries(LOCATIONS).map(([country, cities]) => (
                                                    <optgroup key={`from-group-${country}`} label={country}>
                                                        {cities.map(city => (
                                                            <option key={`from-opt-${city}`} value={city}>{city}</option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="space-y-2 relative z-20">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1 flex items-center gap-1">
                                                <Icon name="map-pin" className="w-3 h-3 text-cyan-400" /> Куда (Город)
                                            </label>
                                            <select value={formData.to} onChange={(e) => setFormData({ ...formData, to: e.target.value })} className="w-full px-4 md:pl-14 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-cyan-500/50 text-white font-bold cursor-pointer appearance-none">
                                                {Object.entries(LOCATIONS).map(([country, cities]) => (
                                                    <optgroup key={`to-group-${country}`} label={country}>
                                                        {cities.map(city => (
                                                            <option key={`to-opt-${city}`} value={city}>{city}</option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Дата отправления</label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="calendar" className="w-5 h-5 text-indigo-400" /></div>
                                                <input type="date" required value={formData.date} onChange={(e) => setFormData({ ...formData, date: e.target.value })} className="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white font-semibold cursor-pointer" style={{ colorScheme: 'dark' }} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Время отпр.</label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="clock" className="w-5 h-5 text-indigo-400" /></div>
                                                <input type="time" required value={formData.time} onChange={(e) => setFormData({ ...formData, time: e.target.value })} className="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white font-semibold cursor-pointer" style={{ colorScheme: 'dark' }} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1 flex items-center justify-between">
                                                <span>Прибытие</span>
                                                <span className="text-[9px] text-emerald-400 normal-case bg-emerald-400/10 px-2 py-0.5 rounded-full block md:hidden">В пути: {travelStr}</span>
                                            </label>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="map-pin" className="w-5 h-5 text-emerald-400" /></div>
                                                <div className="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl text-white font-semibold flex justify-between items-center opacity-80 pointer-events-none select-none">
                                                    <span className="text-emerald-300">{arrivalTimeStr || '--:--'}</span>
                                                    <span className="text-[10px] text-slate-400">{arrivalDateStr || '--.--.----'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Transport turi */}
                                    <div className="space-y-2">
                                        {/* Рейслар tugmasi - katta, to'liq kenglikda */}
                                        <button
                                            type="button"
                                            onClick={() => setShowTrips(prev => !prev)}
                                            className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all text-left ${showTrips ? (transportMode === 'train' ? 'bg-indigo-500/20 border-indigo-500 text-white shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 'bg-cyan-500/20 border-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.2)]') : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <Icon name={transportMode === 'train' ? 'train' : 'plane'} className={`w-5 h-5 ${showTrips ? (transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400') : 'text-slate-400'}`} />
                                                <span className="font-bold text-sm">Рейслар</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {travelTime.speed > 0 && (
                                                    <span className="text-[9px] text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded-full border border-emerald-400/20">
                                                        {travelTime.speed} км/ч
                                                    </span>
                                                )}
                                                <Icon name={showTrips ? 'chevron-up' : 'chevron-down'} className={`w-4 h-4 ${showTrips ? (transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400') : 'text-slate-400'}`} />
                                            </div>
                                        </button>
                                        <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1 flex items-center gap-1">
                                            <span className="flex items-center gap-1">
                                                <Icon name={transportMode === 'train' ? 'train' : 'plane'} className={`w-3 h-3 ${transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400'}`} />
                                                {transportMode === 'train' ? 'Тип поезда' : 'Тип самолета'}
                                            </span>
                                        </label>
                                        <select
                                            value={vehicleType}
                                            onChange={(e) => setVehicleType(e.target.value)}
                                            className="w-full px-4 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-indigo-500/50 text-white font-bold cursor-pointer appearance-none"
                                        >
                                            {transportMode === 'train' ? (
                                                <React.Fragment>
                                                    <option value="Афросиаб (Высокоскоростной)">Афросиаб (Высокоскоростной)</option>
                                                    <option value="Шарк (Скоростной)">Шарк (Скоростной)</option>
                                                    <option value="Спальный вагон (Ночной)">Спальный вагон (Ночной)</option>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <option value="Boeing 787 Dreamliner">Boeing 787 Dreamliner</option>
                                                    <option value="Airbus A320neo">Airbus A320neo</option>
                                                </React.Fragment>
                                            )}
                                        </select>
                                    </div>

                                    {showTrips && (
                                        <div className="space-y-3 animate-fade-in">
                                            <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1 flex items-center gap-2"><Icon name={transportMode === 'train' ? 'train' : 'plane'} className={`w-3 h-3 ${transportMode === 'train' ? 'text-indigo-400' : 'text-cyan-400'}`} />Рейсы</label>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">{(transportMode === 'train' ? [{ vehicle: 'Афросиаб (Высокоскоростной)', dep: '07:30' }, { vehicle: 'Шарк (Скоростной)', dep: '14:15' }, { vehicle: 'Спальный вагон (Ночной)', dep: '22:00' }] : [{ vehicle: 'Boeing 787 Dreamliner', dep: '04:00' }, { vehicle: 'Airbus A320neo', dep: '11:45' }, { vehicle: 'Boeing 737 MAX', dep: '19:20' }]).map(r => { const dur = getTravelDuration(formData.from, formData.to, transportMode, r.vehicle); const depDate = new Date(`${formData.date}T${r.dep}`); const arrDate = new Date(depDate.getTime() + (dur.hours * 60 + dur.mins) * 60000); const arrTime = isNaN(arrDate.getTime()) ? '--:--' : arrDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); const durStr = dur.hours > 0 || dur.mins > 0 ? `${dur.hours}ч ${dur.mins > 0 ? dur.mins + 'м' : ''}` : '--'; const isActive = vehicleType === r.vehicle; return (<button key={r.vehicle} type="button" onClick={() => { setVehicleType(r.vehicle); setFormData(prev => ({ ...prev, time: r.dep })); setShowTrips(false); }} className={`relative flex flex-col items-center justify-center p-4 rounded-2xl border transition-all overflow-hidden ${isActive ? (transportMode === 'train' ? 'bg-indigo-500/20 border-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.25)]' : 'bg-cyan-500/20 border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.25)]') : 'bg-white/5 border-white/10 hover:bg-white/10'}`}>{isActive && <div className={`absolute inset-0 opacity-10 ${transportMode === 'train' ? 'bg-indigo-400' : 'bg-cyan-400'}`}></div>}<span className={`text-2xl font-black font-mono relative z-10 ${isActive ? (transportMode === 'train' ? 'text-indigo-300' : 'text-cyan-300') : 'text-white'}`}>{r.dep}</span><span className={`text-[10px] font-bold mt-1 relative z-10 ${isActive ? 'text-emerald-400' : 'text-slate-400'}`}> {arrTime}</span><span className="text-[9px] text-slate-500 mt-1 relative z-10">{durStr}</span><span className={`text-[9px] font-bold mt-2 px-2 py-0.5 rounded-full relative z-10 ${isActive ? (transportMode === 'train' ? 'bg-indigo-500/30 text-indigo-300' : 'bg-cyan-500/30 text-cyan-300') : 'bg-white/5 text-slate-400'}`}>{r.vehicle.split(' ')[0]}</span></button>); })}</div>
                                        </div>
                                    )}

                                    <div className="space-y-3">
                                        <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Класс обслуживания</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <label className={`cursor-pointer rounded-2xl p-4 border transition-all flex flex-col items-center gap-2 relative overflow-hidden ${isStandard ? 'bg-indigo-500/20 border-indigo-500 text-white shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 'bg-white/5 border-white/10 text-white hover:bg-white/10'}`}>
                                                <input type="radio" name="type" className="hidden" checked={isStandard} onChange={() => handleTypeChange('STANDARD')} />
                                                {isStandard && <div className="absolute -top-10 -right-10 w-20 h-20 bg-indigo-500/30 blur-xl rounded-full"></div>}
                                                <Icon name="info" className="w-6 h-6" />
                                                <div className="text-center">
                                                    <div className="font-bold tracking-wide">Standard</div>
                                                    <div className="text-xs font-mono mt-1 text-white/80">{PRICES[transportMode]['STANDARD'].toLocaleString('ru-RU')} сум</div>
                                                </div>
                                            </label>
                                            <label className={`cursor-pointer rounded-2xl p-4 border transition-all flex flex-col items-center gap-2 relative overflow-hidden ${!isStandard ? 'bg-cyan-500/20 border-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.2)]' : 'bg-white/5 border-white/10 text-white hover:bg-white/10'}`}>
                                                <input type="radio" name="type" className="hidden" checked={!isStandard} onChange={() => handleTypeChange('BUSINESS')} />
                                                {!isStandard && <div className="absolute -top-10 -right-10 w-20 h-20 bg-cyan-500/30 blur-xl rounded-full"></div>}
                                                <Icon name="credit-card" className="w-6 h-6" />
                                                <div className="text-center">
                                                    <div className="font-bold tracking-wide">Business (+VIP)</div>
                                                    <div className="text-xs font-mono mt-1 text-white/80">{PRICES[transportMode]['BUSINESS'].toLocaleString('ru-RU')} сум</div>
                                                </div>
                                            </label>
                                        </div>
                                    </div>

                                    <div className="bg-black/20 rounded-[2rem] p-6 md:p-8 border border-white/5 overflow-hidden">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                                            <h3 className="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="tag" className="w-4 h-4 text-indigo-400" /> Схема {transportMode === 'train' ? 'Вагона' : 'Салона'}
                                            </h3>
                                            <div className="flex space-x-5 text-xs font-semibold text-white">
                                                <div className="flex items-center gap-2"><div className="w-4 h-4 bg-white/10 border border-white/20 rounded-md"></div> Свободно</div>
                                                <div className="flex items-center gap-2"><div className={`w-4 h-4 rounded-md ${isStandard ? 'bg-gradient-to-br from-rose-500 to-red-600' : 'bg-gradient-to-br from-cyan-400 to-blue-600'}`}></div> Выбрано</div>
                                            </div>
                                        </div>

                                        <div className={`w-full ${transportMode === 'plane' && isStandard ? 'max-w-[340px]' : 'max-w-[280px]'} mx-auto bg-slate-900/80 p-6 rounded-[3rem] shadow-2xl border-4 relative overflow-hidden ${isStandard ? 'border-slate-700/50' : 'border-cyan-700/50'}`}>
                                            <div className={`absolute top-0 left-1/2 -translate-x-1/2 ${transportMode === 'plane' ? 'w-32 h-6 rounded-b-[2rem]' : 'w-20 h-3 rounded-b-xl'} ${isStandard ? 'bg-slate-700/50' : 'bg-cyan-700/50'}`}></div>

                                            <div className={`space-y-4 ${transportMode === 'plane' ? 'mt-10' : 'mt-6'}`}>
                                                {activeLayout.map((row, rowIndex) => (
                                                    <div key={rowIndex} className="flex justify-between items-center">
                                                        {row.map((seat, colIndex) => {
                                                            if (seat.startsWith('aisle')) {
                                                                const isWide = seat === 'aisle-wide';
                                                                return <div key={`aisle-${rowIndex}`} className={`${isWide ? 'w-12' : 'w-8'} h-full flex justify-center items-center`}>{rowIndex % 3 === 0 && <div className={`w-1 h-1 rounded-full ${isStandard ? 'bg-white/10' : 'bg-cyan-500/30'}`}></div>}</div>;
                                                            }
                                                            const isSelected = selectedSeats.includes(seat);
                                                            const isOccupied = occupiedSeats.includes(seat);
                                                            const isPlaneEconomy = transportMode === 'plane' && isStandard;
                                                            const seatSize = isPlaneEconomy ? 'w-8 h-10 text-[10px]' : (isStandard ? 'w-11 h-14 text-xs' : 'w-14 h-16 text-xs');

                                                            let seatStyles = 'bg-white/5 text-white border-white/10 hover:bg-white/10 cursor-pointer';
                                                            if (isOccupied) seatStyles = 'bg-slate-800 border-slate-700 text-slate-500 cursor-not-allowed opacity-60';
                                                            else if (isSelected) seatStyles = isStandard ? 'bg-gradient-to-b from-rose-400 to-red-600 text-white border-red-400 scale-110 shadow-[0_0_10px_rgba(225,29,72,0.5)]' : 'bg-gradient-to-b from-cyan-400 to-blue-600 text-white border-cyan-400 scale-110 shadow-[0_0_10px_rgba(6,182,212,0.5)]';

                                                            return (
                                                                <button key={seat} type="button" disabled={isOccupied} onClick={() => toggleSeat(seat)} className={`relative rounded-t-xl rounded-b-md font-mono font-bold transition-all flex items-center justify-center transform border ${seatSize} ${seatStyles}`}>
                                                                    <div className={`absolute top-1 left-1/2 -translate-x-1/2 ${isPlaneEconomy ? 'w-4' : (isStandard ? 'w-6' : 'w-8')} h-1.5 rounded-full ${isSelected ? 'bg-white/30' : (isOccupied ? 'bg-slate-600' : 'bg-black/20')}`}></div>
                                                                    <span className={isPlaneEconomy ? 'mt-1.5' : 'mt-2'}>{isOccupied ? '×' : seat}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Дополнительные услуги (Опционально)</label>
                                        <div className="grid grid-cols-1 gap-3">
                                            {EXTRA_SERVICES.map(ext => {
                                                const isActive = extras.includes(ext.id);
                                                return (
                                                    <button
                                                        key={ext.id}
                                                        type="button"
                                                        onClick={() => toggleExtra(ext.id)}
                                                        className={`flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl border transition-all text-left gap-2 ${isActive ? 'bg-indigo-500/20 border-indigo-500 text-white shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'}`}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <Icon name={ext.icon} className={`w-5 h-5 ${isActive ? 'text-indigo-400' : 'text-slate-400'}`} />
                                                            <span className="font-bold text-sm">{ext.name}</span>
                                                        </div>
                                                        <span className="font-mono text-sm sm:text-right">+{ext.price.toLocaleString('ru-RU')} сум</span>
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Промокод</label>
                                        <div className="flex flex-col sm:flex-row gap-3">
                                            <input
                                                type="text"
                                                placeholder="Введите код (напр. SUPER30)"
                                                value={promoCode}
                                                onChange={e => setPromoCode(e.target.value.toUpperCase())}
                                                className="flex-1 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-indigo-500/50 text-white font-mono placeholder:text-white/40 uppercase tracking-widest"
                                            />
                                            <button
                                                type="button"
                                                onClick={handlePromoApply}
                                                className="px-6 py-4 sm:py-0 bg-white/10 hover:bg-white/20 rounded-2xl text-white font-bold transition-all border border-white/10 whitespace-nowrap"
                                            >
                                                Применить
                                            </button>
                                        </div>
                                        {promoError && <p className="text-red-400 text-xs font-bold mt-1 pl-1 flex items-center gap-1"><Icon name="alert-circle" className="w-3 h-3" />{promoError}</p>}
                                        {promoSuccess && <p className="text-emerald-400 text-xs font-bold mt-1 pl-1 flex items-center gap-1"><Icon name="check-circle" className="w-3 h-3" />{promoSuccess}</p>}
                                    </div>

                                    <div className="pt-4 border-t border-white/10 space-y-6">
                                        <h3 className="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2"><Icon name="users" className="w-4 h-4 text-indigo-400" /> Данные пассажира</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2"><label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Имя пассажира (FIO)</label><div className="relative"><div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="user" className="w-5 h-5 text-indigo-400" /></div><input type="text" required value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white placeholder:text-white/60 focus:border-indigo-500" placeholder="Иван Иванов" /></div></div>
                                            <div className="space-y-2"><label className="text-[11px] font-bold text-white uppercase tracking-widest pl-1">Телефон</label><div className="flex bg-white/5 border border-white/10 rounded-2xl overflow-hidden focus-within:border-indigo-500 transition-colors"><div className="px-4 py-4 flex items-center bg-black/20 border-r border-white/10"><img src="https://flagcdn.com/w20/uz.png" alt="UZ" className="w-5 h-auto rounded-sm opacity-80" /><span className="ml-2 font-bold text-sm text-white">+998</span></div><input type="text" required value={formData.phone} onChange={handlePhoneChange} className="flex-1 px-4 py-4 bg-transparent outline-none font-mono font-bold text-white placeholder:text-white/60" placeholder="90 123 45 67" /></div></div>
                                        </div>
                                    </div>

                                    <button onClick={handleProceedToPayment} disabled={selectedSeats.length === 0 || !formData.name || !formData.phone} className={`w-full py-5 rounded-2xl font-black text-lg transition-all flex flex-col sm:flex-row justify-center items-center gap-2 ${selectedSeats.length === 0 || !formData.name || !formData.phone ? 'bg-white/10 text-white cursor-not-allowed border border-white/20' : 'bg-gradient-to-r from-indigo-600 to-violet-600 text-white glow-button hover:scale-[1.02]'}`}>
                                        {selectedSeats.length === 0 ? "🪑 O'rindiq tanlang" : (!formData.name || !formData.phone ? '📝 Ism va telefon kiriting' : (<React.Fragment><span>To'lovga o'tish — {selectedSeats.length} ta chipta</span><span className="hidden sm:inline">•</span><span>{totalPrice.toLocaleString('ru-RU')} so'm</span></React.Fragment>))}
                                        {selectedSeats.length > 0 && formData.name && formData.phone && <Icon name="chevron-right" className="w-5 h-5 hidden sm:block" />}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* 2. TO'LOV TANLASH */}
                        {step === 'payment' && (
                            <div className="glass-panel max-w-md w-full rounded-[2.5rem] shadow-2xl p-8 text-center relative z-10 animate-slide-up no-print mt-10">
                                <div className="absolute -top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full font-mono font-black border-4 border-[#0f172a] shadow-lg flex items-center gap-2">
                                    <Icon name="timer" className="w-4 h-4 animate-pulse" /> {formatTime(timeLeft)}
                                </div>
                                <div className="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6 mt-4"><Icon name="credit-card" className="w-10 h-10 text-indigo-400" /></div>
                                <h2 className="text-3xl font-black text-white mb-2">Оплата билетов</h2>
                                <div className="text-slate-300 text-sm mb-6">
                                    Уважаемый пассажир, сумма к оплате составляет:
                                    {discountPercent > 0 && (
                                        <div className="text-emerald-400 text-xs font-bold mt-2 bg-emerald-400/10 inline-block px-3 py-1 rounded-full border border-emerald-400/20">
                                            Применена скидка {discountPercent * 100}%
                                        </div>
                                    )}
                                    <span className="text-4xl font-mono font-black text-indigo-400 glow-text block mt-4 mb-2">{totalPrice.toLocaleString('ru-RU')} сум</span>
                                </div>
                                <div className="w-full h-px bg-white/10 mb-6"></div>

                                <div className="space-y-4">
                                    <button onClick={() => processExternalGateway('Payme')} className="w-full bg-[#14E5C5]/10 hover:bg-[#14E5C5]/20 border border-[#14E5C5]/30 text-white py-5 rounded-2xl flex items-center justify-center relative overflow-hidden transition-all group">
                                        <div className="absolute inset-0 bg-gradient-to-r from-[#14E5C5]/0 via-[#14E5C5]/10 to-[#14E5C5]/0 -translate-x-full group-hover:shimmer-effect"></div>
                                        <span className="text-[#14E5C5] font-black text-xl tracking-widest group-hover:scale-110 transition-transform">Payme</span>
                                    </button>
                                    <button onClick={() => processExternalGateway('Click')} className="w-full bg-[#00AEEF]/10 hover:bg-[#00AEEF]/20 border border-[#00AEEF]/30 text-white py-5 rounded-2xl flex items-center justify-center relative overflow-hidden transition-all group">
                                        <div className="absolute inset-0 bg-gradient-to-r from-[#00AEEF]/0 via-[#00AEEF]/10 to-[#00AEEF]/0 -translate-x-full group-hover:shimmer-effect"></div>
                                        <span className="text-[#00AEEF] font-black text-xl tracking-widest group-hover:scale-110 transition-transform">CLICK</span>
                                    </button>
                                    <button onClick={() => processExternalGateway('Uzum Pay')} className="w-full bg-[#7000FF]/10 hover:bg-[#7000FF]/20 border border-[#7000FF]/30 text-white py-5 rounded-2xl flex items-center justify-center relative overflow-hidden transition-all group">
                                        <div className="absolute inset-0 bg-gradient-to-r from-[#7000FF]/0 via-[#7000FF]/10 to-[#7000FF]/0 -translate-x-full group-hover:shimmer-effect"></div>
                                        <span className="text-[#7000FF] font-black tracking-[0.2em] text-xl group-hover:scale-110 transition-transform">UZUM PAY</span>
                                    </button>
                                </div>
                                <button onClick={() => setStep('form')} className="mt-6 text-xs text-slate-400 hover:text-white underline transition-colors">Отменить и вернуться к выбору мест</button>
                            </div>
                        )}

                        {/* TASDIQLASH OYNASI (MODAL) */}
                        {showConfirmModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                                <div className="bg-slate-900 border border-white/10 rounded-[2rem] p-8 max-w-sm w-full shadow-[0_0_50px_rgba(0,0,0,0.8)] transform animate-slide-up text-center">
                                    <div className="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name="help-circle" className="w-8 h-8 text-indigo-400" />
                                    </div>
                                    <h3 className="text-xl font-black text-white mb-2">Подтверждение оплаты</h3>
                                    <p className="text-slate-300 text-sm mb-6 leading-relaxed">
                                        Вы уверены, что хотите забронировать выбранные места <strong className="text-white">({selectedSeats.join(', ')})</strong> на {transportMode === 'train' ? 'поезд' : 'самолет'}?
                                        <br /><br />
                                        Нажимая «Подтвердить», вы соглашаетесь с условиями бронирования и правилами тарифа.
                                    </p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowConfirmModal(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-white/5 hover:bg-white/10 transition-colors border border-white/10">
                                            Отмена
                                        </button>
                                        <button onClick={confirmAndPay} className="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-500/30">
                                            Подтвердить
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. TASHQI TO'LOV */}
                        {step === 'gateway' && (
                            <div className="glass-panel bg-slate-900/95 max-w-sm w-full rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.8)] overflow-hidden relative z-50 animate-fade-in border border-white/10">

                                <div className={`p-6 text-center ${paymentProvider === 'Payme' ? 'bg-[#14E5C5] text-slate-900' : paymentProvider === 'Click' ? 'bg-[#00AEEF] text-white' : 'bg-[#7000FF] text-white'}`}>
                                    <h2 className="text-2xl font-black uppercase tracking-widest">{paymentProvider}</h2>
                                    <p className="text-[10px] opacity-80 mt-1 font-bold uppercase">Официальный платежный шлюз</p>
                                </div>

                                <div className="p-8 text-white">
                                    <div className="flex justify-between items-center mb-4"><span className="text-slate-400 font-bold text-xs uppercase">Продавец:</span><span className="font-black text-white">{brandName}</span></div>
                                    <div className="flex justify-between items-center mb-8 pb-6 border-b border-white/10">
                                        <span className="text-slate-400 font-bold text-xs uppercase">К оплате:</span>
                                        <span className="font-black text-2xl text-white">{totalPrice.toLocaleString('ru-RU')} сум</span>
                                    </div>

                                    {isProcessing ? (
                                        <div className="flex flex-col items-center justify-center py-6">
                                            <Icon name="loader-2" className={`w-14 h-14 animate-spin mb-4 ${paymentProvider === 'Payme' ? 'text-[#14E5C5]' : paymentProvider === 'Click' ? 'text-[#00AEEF]' : 'text-[#7000FF]'}`} />
                                            <p className="font-bold text-slate-300">Обработка платежа...</p>
                                            <p className="text-xs text-slate-500 mt-2 text-center">Не закрывайте эту страницу,<br />идет связь с банком.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-5">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase">Номер карты</label>
                                                <input
                                                    type="text"
                                                    value={cardNumber}
                                                    onChange={handleCardNumberChange}
                                                    placeholder="8600 0000 0000 0000"
                                                    className="w-full mt-1 p-4 bg-black/30 border border-white/10 rounded-xl font-mono text-lg outline-none focus:border-indigo-500 text-white font-bold placeholder-white/20 transition-all"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase">Срок (ММ/ГГ)</label>
                                                <input
                                                    type="text"
                                                    value={cardExpiry}
                                                    onChange={handleCardExpiryChange}
                                                    placeholder="12/28"
                                                    className="w-full mt-1 p-4 bg-black/30 border border-white/10 rounded-xl font-mono text-lg outline-none focus:border-indigo-500 text-white font-bold text-center placeholder-white/20 transition-all"
                                                />
                                            </div>

                                            {/* Avtomatik Karta Egasi chiqadigan joy */}
                                            <div className="h-6 mt-1 flex items-center justify-center">
                                                {isFetchingName ? (
                                                    <span className="text-xs font-bold text-slate-400 flex items-center gap-2">
                                                        <Icon name="loader-2" className="w-3 h-3 animate-spin" /> Поиск владельца...
                                                    </span>
                                                ) : cardHolder ? (
                                                    <span className="text-sm font-black text-emerald-400 flex items-center gap-2 animate-fade-in">
                                                        <Icon name="user-check" className="w-4 h-4" /> {cardHolder}
                                                    </span>
                                                ) : null}
                                            </div>

                                            <button onClick={handleFinalizeClick} className={`w-full py-4 rounded-xl font-black text-lg mt-2 shadow-lg flex justify-center items-center gap-2 active:scale-95 transition-transform ${paymentProvider === 'Payme' ? 'bg-[#14E5C5] text-slate-900 shadow-[#14E5C5]/20 hover:bg-[#14E5C5]/90' : paymentProvider === 'Click' ? 'bg-[#00AEEF] text-white shadow-[#00AEEF]/20 hover:bg-[#00AEEF]/90' : 'bg-[#7000FF] text-white shadow-[#7000FF]/20 hover:bg-[#7000FF]/90'}`}><Icon name="shield-check" className="w-5 h-5" /> Оплатить</button>
                                            <button onClick={() => setStep('payment')} className="w-full py-3 text-xs font-bold text-slate-400 hover:text-white underline transition-colors">Отменить платеж</button>
                                        </div>
                                    )}
                                </div>
                                <div className="bg-black/30 py-3 text-center text-[10px] font-bold text-slate-500 border-t border-white/10 flex justify-center items-center gap-1"><Icon name="shield-check" className="w-3 h-3 text-emerald-500" /> Безопасное зашифрованное соединение</div>
                            </div>
                        )}

                        {/* 4. BILET VA MUVAFFAQIYAT EKRANI */}
                        {step === 'success' && (
                            <div className="max-w-md w-full relative z-10 animate-slide-up pb-20">
                                <div className="text-center mb-6">
                                    <div className="inline-flex items-center justify-center w-20 h-20 bg-green-500/20 rounded-full mb-4 glow-seat"><Icon name="check-circle" className="w-10 h-10 text-green-400" /></div>
                                    <h2 className="text-3xl font-black text-white mb-2 leading-tight">Вы успешно оплатили<br />билеты!</h2>
                                    <p className="text-slate-400">Билет отправлен на ваш Email</p>
                                </div>
                                <div className="ticket-print-area bg-gradient-to-br from-white to-slate-100 rounded-[2rem] overflow-hidden text-slate-900 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                    <div className={`p-6 text-white relative ${isStandard ? 'bg-indigo-600' : 'bg-cyan-700'}`}>
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                        <div className="flex justify-between items-center relative z-10">
                                            <span className="font-black text-xl flex items-center gap-2"><Icon name={iconName} className="w-6 h-6" /> {brandName}</span>
                                            <span className={`px-3 py-1 rounded-full text-xs font-black border ${isStandard ? 'bg-white/20 border-white/30 text-white' : 'bg-cyan-400 border-cyan-300 text-cyan-950'}`}>{isStandard ? 'STANDARD' : 'VIP CLASS'}</span>
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <div className="flex justify-between items-center mb-8">
                                            <div className="text-left w-2/5"><p className="text-xs font-bold text-slate-400 uppercase">Откуда</p><p className="text-xl font-black">{formData.from}</p></div>
                                            <div className="flex-1 px-2 relative flex items-center justify-center"><div className="w-full h-0.5 bg-slate-200"></div><Icon name={iconName} className={`absolute w-6 h-6 bg-white px-1 ${isStandard ? 'text-indigo-600' : 'text-cyan-600'}`} /></div>
                                            <div className="text-right w-2/5"><p className="text-xs font-bold text-slate-400 uppercase">Куда</p><p className="text-xl font-black">{formData.to}</p></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6 mb-8">
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Пассажир</p><p className="font-bold truncate">{formData.name || 'Гость'}</p></div>
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Маршрут ({travelStr})</p>
                                                <div className="font-mono mt-1 text-xs space-y-1">
                                                    <p className="font-bold"><span className="text-slate-400 font-sans text-[10px] mr-1">ОТПР:</span>{formData.date.split('-').reverse().join('.')} <span className={isStandard ? 'text-indigo-600' : 'text-cyan-600'}>{formData.time}</span></p>
                                                    <p className="font-bold"><span className="text-slate-400 font-sans text-[10px] mr-1">ПРИБ:</span>{arrivalDateStr} <span className="text-emerald-500">{arrivalTimeStr}</span></p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex justify-between items-center mb-4">
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Места</p><div className={`flex flex-wrap gap-1 font-mono font-black text-sm max-w-[120px] ${isStandard ? 'text-red-600' : 'text-cyan-600'}`}>{selectedSeats.join(', ')}</div></div>
                                            <div className="text-right"><p className="text-[10px] font-bold text-slate-400 uppercase">Билетов</p><p className="font-black text-xl">{selectedSeats.length}</p></div>
                                        </div>

                                        <div className="text-xs text-slate-700 font-bold bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100 mb-4 flex items-center gap-2">
                                            <Icon name={iconName} className="w-4 h-4 text-indigo-500" />
                                            {vehicleType}
                                        </div>

                                        {extras.length > 0 && (
                                            <div className="text-xs text-slate-500 font-medium">
                                                <p className="font-bold uppercase tracking-wider mb-1 text-[10px]">Доп. услуги:</p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    {extras.map(extId => {
                                                        const ext = EXTRA_SERVICES.find(e => e.id === extId);
                                                        return <li key={extId}>{ext?.name}</li>
                                                    })}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                    <div className="relative flex items-center">
                                        <div className="w-6 h-6 bg-[#0f172a] rounded-full absolute -left-3"></div><div className="w-full h-1 ticket-dash mx-6"></div><div className="w-6 h-6 bg-[#0f172a] rounded-full absolute -right-3"></div>
                                    </div>
                                    <div className="p-8 bg-slate-50 flex flex-col items-center justify-center text-center">
                                        <Icon name="qr-code" className="w-20 h-20 text-slate-800 mb-3" />
                                        <p className="font-mono font-bold text-slate-400 tracking-[0.2em]">{orderNumber}</p>
